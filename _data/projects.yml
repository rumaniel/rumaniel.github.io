- slug: solitaire
  title: Solitaire
  subtitle_ko: Unity로 만든 클래식 카드 게임
  subtitle_en: A classic card game made with Unity
  status_ko: 서비스 중
  status_en: Live
  description_ko: |
    Clean Architecture 기반으로 설계한 솔리테어(클론다이크/이스트헤이븐) 카드 게임.
    도메인 모델은 Unity 의존을 배제했고, VContainer로 DI를, R3 + UniTask로 반응형/비동기 흐름을 다룬다.
    힌트, 자동승, 언두/리두, 세션·라이프타임 통계, 한/영 로컬라이즈, GitHub Actions 기반 빌드/테스트 파이프라인을 갖췄다.
  description_en: |
    A Klondike/Easthaven solitaire game built on a Clean Architecture foundation.
    Domain models are kept Unity-free; VContainer handles DI, while R3 + UniTask drive reactive and async flows.
    Features include hints, auto-win, undo/redo, session and lifetime stats, KO/EN localization,
    and a GitHub Actions pipeline for builds and tests.
  tech: [Unity 2022.3 LTS, C#, VContainer, R3, UniTask, MemoryPack, Addressables, GitHub Actions]
